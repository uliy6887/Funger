<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>舒爾特方格 - 螢光音效版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #0a0f1a;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            max-width: 600px;
            width: 100%;
            background: #0f1219;
            border-radius: 48px;
            padding: 18px 16px 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2f3a;
        }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #05080f;
            padding: 10px 16px;
            border-radius: 100px;
            margin-bottom: 20px;
            border: 1px solid #2c3142;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3eff9e;
            box-shadow: 0 0 6px #3eff9e;
        }
        .user-name {
            color: #eef5ff;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .user-status {
            color: #8f9bb5;
            font-size: 0.7rem;
        }
        .size-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .size-btn {
            background: #121624;
            border: 1px solid #2e3a48;
            color: #bfffc9;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #03060c;
            transition: 0.05s linear;
        }
        .size-btn.active {
            background: #1b4b2f;
            border-color: #3eff9e;
            color: white;
        }
        .size-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #03060c;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #03060c;
            padding: 10px 16px;
            border-radius: 48px;
            margin-bottom: 24px;
            border: 1px solid #2a2f3e;
        }
        .stat {
            text-align: center;
            flex: 1;
        }
        .stat-label {
            font-size: 0.65rem;
            color: #7e8aa5;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #3eff9e;
            text-shadow: 0 0 4px #00cc77;
            line-height: 1.2;
        }
        #errorCount {
            color: #ff7760;
        }
        .grid {
            display: grid;
            gap: 10px;
            margin-bottom: 24px;
        }
        .cell {
            aspect-ratio: 1 / 1;
            background: #10131f;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.5rem;
            font-family: monospace;
            color: #bfffc9;
            cursor: pointer;
            border: 1px solid #2a3250;
            box-shadow: 0 6px 0 #03060c;
            transition: 0.05s linear;
        }
        .cell:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #03060c;
        }
        .cell.completed {
            background: #0a2e1f;
            border-color: #3eff9e;
            color: #a0f0c0;
            text-decoration: line-through;
            opacity: 0.7;
            cursor: default;
            transform: none;
            box-shadow: 0 2px 0 #03060c;
        }
        /* 錯誤閃爍 */
        .cell.error-flash {
            animation: shakeFlash 0.2s ease-in-out 0s 2;
            background-color: #c44;
            border-color: #ff8888;
        }
        @keyframes shakeFlash {
            0% { transform: translateX(0px); background: #d55; }
            50% { transform: translateX(4px); background: #f66; }
            100% { transform: translateX(0px); background: #c44; }
        }
        /* 螢光點擊特效 */
        .cell.flash-pink {
            background: #ff69b4 !important;
            box-shadow: 0 0 15px #ff69b4 !important;
            border-color: #fff0f5 !important;
        }
        .cell.flash-blue {
            background: #00bfff !important;
            box-shadow: 0 0 15px #00bfff !important;
            border-color: #e0f7ff !important;
        }
        .cell.flash-purple {
            background: #bf5fff !important;
            box-shadow: 0 0 15px #bf5fff !important;
            border-color: #f0e6ff !important;
        }
        .control-bar {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 8px;
        }
        .btn {
            background: #121624;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #d0f0e0;
            box-shadow: 0 5px 0 #05080c;
            cursor: pointer;
            border: 1px solid #2e3a48;
            flex: 0.4;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #05080c;
        }
        .btn-primary {
            background: #1b4b2f;
            border-color: #3eff9e;
        }
        .completion-message {
            text-align: center;
            margin-top: 16px;
            background: #1e2a1f;
            padding: 8px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #c6ffc1;
        }
        footer {
            font-size: 0.6rem;
            text-align: center;
            margin-top: 20px;
            color: #4a5270;
        }
        @media (max-width: 480px) {
            .cell { font-size: 1.2rem; }
            .stat-value { font-size: 1.3rem; }
        }
    </style>
    <script src="https://static.line-scdn.net/liff/edge/versions/2.23.1/sdk.js"></script>
</head>
<body>
<div class="game-container">
    <div class="profile-area">
        <img id="avatarImg" class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23333'%3E%3Ccircle cx='12' cy='8' r='4' fill='%23666'/%3E%3Cpath d='M12 14c-4 0-6 2-6 4h12c0-2-2-4-6-4z' fill='%23666'/%3E%3C/svg%3E" alt="avatar">
        <div class="user-info">
            <div class="user-name" id="userName">Loading LINE...</div>
            <div class="user-status">🎵 螢光點擊 + 音效</div>
        </div>
    </div>

    <div class="size-selector">
        <button class="size-btn" data-size="3">3x3</button>
        <button class="size-btn active" data-size="5">5x5</button>
        <button class="size-btn" data-size="6">6x6</button>
    </div>

    <div class="stats-panel">
        <div class="stat"><div class="stat-label">⏱️ 時間</div><div class="stat-value" id="timerDisplay">0.00</div></div>
        <div class="stat"><div class="stat-label">🏆 最佳</div><div class="stat-value" id="bestDisplay">--</div></div>
        <div class="stat"><div class="stat-label">❌ 錯誤</div><div class="stat-value" id="errorCount">0</div></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="control-bar">
        <button class="btn" id="resetBtn">🔄 新的一局</button>
        <button class="btn btn-primary" id="shuffleBtn">✨ 重新洗牌</button>
    </div>
    <div id="messageArea" class="completion-message" style="display: none;"></div>
    <footer>依序點擊 1 → N | 正確👉叮 錯誤👉嘟 | 螢光粉/藍/紫交替</footer>
</div>

<script>
    // ========== 音效管理 (Web Audio) ==========
    class SoundFX {
        constructor() {
            this.audioCtx = null;
            this.initialized = false;
        }
        // 必須在使用者點擊後初始化
        init() {
            if (this.initialized) return;
            try {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.initialized = true;
            } catch(e) { console.warn("Web Audio not supported"); }
        }
        // 播放正確音效 (高頻短促)
        playCorrect() {
            if (!this.initialized) this.init();
            if (!this.audioCtx) return;
            const now = this.audioCtx.currentTime;
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.frequency.value = 880; // A5 高音
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.3);
        }
        // 播放錯誤音效 (低頻短促)
        playError() {
            if (!this.initialized) this.init();
            if (!this.audioCtx) return;
            const now = this.audioCtx.currentTime;
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.frequency.value = 220; // A3 低音
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.35);
        }
        // 喚醒 AudioContext (某些瀏覽器需要 user gesture 後 resume)
        resume() {
            if (this.audioCtx && this.audioCtx.state === 'suspended') {
                this.audioCtx.resume();
            }
        }
    }

    const sound = new SoundFX();

    // ========== 遊戲邏輯 ==========
    let currentSize = 5;
    let currentGrid = [];
    let nextNumber = 1;
    let gameActive = true;
    let startTime = null;
    let timerInterval = null;
    let errorCount = 0;
    let colorClickCount = 0;   // 交替顏色

    // 最佳紀錄
    let bestTimes = {
        3: localStorage.getItem('bestTime_3') ? parseFloat(localStorage.getItem('bestTime_3')) : null,
        5: localStorage.getItem('bestTime_5') ? parseFloat(localStorage.getItem('bestTime_5')) : null,
        6: localStorage.getItem('bestTime_6') ? parseFloat(localStorage.getItem('bestTime_6')) : null
    };
    for (let sz in bestTimes) {
        if (bestTimes[sz] && (bestTimes[sz] > 999 || isNaN(bestTimes[sz]))) {
            localStorage.removeItem(`bestTime_${sz}`);
            bestTimes[sz] = null;
        }
    }

    // DOM
    const gridContainer = document.getElementById('grid');
    const timerDisplay = document.getElementById('timerDisplay');
    const bestDisplay = document.getElementById('bestDisplay');
    const errorSpan = document.getElementById('errorCount');
    const resetBtn = document.getElementById('resetBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const messageDiv = document.getElementById('messageArea');
    const sizeBtns = document.querySelectorAll('.size-btn');

    function updateBestUI() {
        const best = bestTimes[currentSize];
        if (best !== null && best < 999) bestDisplay.innerText = best.toFixed(2) + ' sec';
        else bestDisplay.innerText = '--';
    }

    function saveBestTime(seconds) {
        if (seconds < 0 || seconds > 999) return false;
        if (bestTimes[currentSize] === null || seconds < bestTimes[currentSize]) {
            bestTimes[currentSize] = seconds;
            localStorage.setItem(`bestTime_${currentSize}`, seconds);
            updateBestUI();
            return true;
        }
        return false;
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        if (startTime !== null) return;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            if (gameActive && startTime) {
                const elapsed = (Date.now() - startTime) / 1000;
                if (elapsed > 999) resetGame(false);
                else timerDisplay.innerText = elapsed.toFixed(2);
            }
        }, 100);
    }

    function generateShuffledArray(total) {
        const arr = Array.from({ length: total }, (_, i) => i + 1);
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function applyColorFlash(element) {
        const colors = ['flash-pink', 'flash-blue', 'flash-purple'];
        const colorClass = colors[colorClickCount % colors.length];
        colorClickCount++;
        element.classList.add(colorClass);
        setTimeout(() => element.classList.remove(colorClass), 180);
    }

    function renderGrid() {
        gridContainer.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`;
        gridContainer.innerHTML = '';
        for (let i = 0; i < currentGrid.length; i++) {
            const num = currentGrid[i];
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (num < nextNumber) cell.classList.add('completed');
            cell.setAttribute('data-index', i);
            cell.innerText = num;
            cell.addEventListener('click', (e) => {
                e.stopPropagation();
                // 每次點擊都喚醒音效上下文 (確保手機能播放)
                sound.resume();
                handleCellClick(i, cell);
            });
            gridContainer.appendChild(cell);
        }
    }

    function handleCellClick(index, cellElement) {
        if (!gameActive) return;
        const clickedNum = currentGrid[index];
        if (clickedNum === nextNumber) {
            // 正確
            sound.playCorrect();          // 🔊 正確音效
            applyColorFlash(cellElement);
            if (nextNumber === 1 && startTime === null) {
                startTimer();
            }
            if (!cellElement.classList.contains('completed')) {
                cellElement.classList.add('completed');
            }
            nextNumber++;
            const total = currentSize * currentSize;
            if (nextNumber > total) {
                gameActive = false;
                stopTimer();
                if (startTime) {
                    const finalTime = (Date.now() - startTime) / 1000;
                    if (finalTime > 0 && finalTime < 999) {
                        timerDisplay.innerText = finalTime.toFixed(2);
                        const isRecord = saveBestTime(finalTime);
                        messageDiv.style.display = 'block';
                        messageDiv.innerHTML = `✨ 完成！ 用時 ${finalTime.toFixed(2)} 秒 ${isRecord ? '🎉 新紀錄！ 🎉' : ''}`;
                    }
                }
            }
        } else {
            // 錯誤
            sound.playError();            // 🔊 錯誤音效
            errorCount++;
            errorSpan.innerText = errorCount;
            cellElement.classList.add('error-flash');
            setTimeout(() => cellElement.classList.remove('error-flash'), 300);
        }
    }

    function resetGame(keepNumbers = false) {
        stopTimer();
        messageDiv.style.display = 'none';
        if (!keepNumbers) {
            const total = currentSize * currentSize;
            currentGrid = generateShuffledArray(total);
        }
        nextNumber = 1;
        errorCount = 0;
        errorSpan.innerText = '0';
        gameActive = true;
        startTime = null;
        timerDisplay.innerText = '0.00';
        renderGrid();
        // 重置顏色計數器 (不重置也可，隨個人偏好)
        colorClickCount = 0;
    }

    function shuffleGame() {
        stopTimer();
        const total = currentSize * currentSize;
        currentGrid = generateShuffledArray(total);
        nextNumber = 1;
        errorCount = 0;
        errorSpan.innerText = '0';
        gameActive = true;
        startTime = null;
        timerDisplay.innerText = '0.00';
        messageDiv.style.display = 'none';
        renderGrid();
        colorClickCount = 0;
    }

    function setSize(newSize) {
        if (newSize === currentSize) return;
        currentSize = newSize;
        sizeBtns.forEach(btn => {
            if (parseInt(btn.dataset.size) === newSize) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        const total = newSize * newSize;
        currentGrid = generateShuffledArray(total);
        nextNumber = 1;
        errorCount = 0;
        errorSpan.innerText = '0';
        gameActive = true;
        startTime = null;
        timerDisplay.innerText = '0.00';
        messageDiv.style.display = 'none';
        stopTimer();
        renderGrid();
        updateBestUI();
        colorClickCount = 0;
    }

    // LIFF 初始化
    async function initLIFF() {
        const LIFF_ID = '2010026891';   // 您提供的 ID
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userName').innerText = profile.displayName || 'LINE User';
                const avatarImg = document.getElementById('avatarImg');
                if (avatarImg && profile.pictureUrl) avatarImg.src = profile.pictureUrl;
            } else {
                document.getElementById('userName').innerText = '請登入 LINE';
                liff.login();
            }
        } catch (err) {
            console.error(err);
            document.getElementById('userName').innerText = '訪客模式';
        }
    }

    // 綁定按鈕事件
    function bindEvents() {
        resetBtn.addEventListener('click', () => resetGame(false));
        shuffleBtn.addEventListener('click', () => shuffleGame());
        sizeBtns.forEach(btn => {
            btn.addEventListener('click', () => setSize(parseInt(btn.dataset.size)));
        });
    }

    // 啟動頁面
    window.addEventListener('load', async () => {
        if (typeof liff !== 'undefined') await initLIFF();
        else document.getElementById('userName').innerText = 'SDK 錯誤';
        // 初始 5x5
        currentSize = 5;
        currentGrid = generateShuffledArray(25);
        renderGrid();
        updateBestUI();
        bindEvents();
        // 預先初始化音效 (但不播放，等到使用者點擊)
        sound.init();
    });
</script>
</body>
</html>
